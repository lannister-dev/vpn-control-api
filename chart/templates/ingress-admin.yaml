{{- if and .Values.admin.enabled .Values.admin.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "control-api.fullname" . }}-admin
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "control-api.labels" . | nindent 4 }}
    component: admin
  {{- with .Values.admin.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.admin.ingress.className }}
  ingressClassName: {{ .Values.admin.ingress.className }}
  {{- end }}
  {{- if .Values.admin.ingress.tls }}
  tls:
    {{- toYaml .Values.admin.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.admin.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "control-api.fullname" $ }}-admin
                port:
                  name: http
          {{- end }}
    {{- end }}
{{- end }}

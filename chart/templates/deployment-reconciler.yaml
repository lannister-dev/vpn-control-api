{{- if .Values.reconciler.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "control-api.fullname" . }}-reconciler
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "control-api.labels" . | nindent 4 }}
    component: reconciler
spec:
  replicas: {{ .Values.reconciler.replicaCount | default 1 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "control-api.selectorLabels" . | nindent 6 }}
      component: reconciler
  template:
    metadata:
      labels:
        {{- include "control-api.selectorLabels" . | nindent 8 }}
        component: reconciler
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.migrations.enabled }}
      initContainers:
        {{- include "control-api.migrateInitContainer" . | nindent 8 }}
      {{- end }}
      containers:
        - name: reconciler
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.reconciler.command | nindent 12 }}
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
          {{- if .Values.envSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.envSecret }}
          {{- end }}
          {{- if .Values.env }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml (.Values.reconciler.resources | default .Values.resources) | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.reconciler.probes.liveness.path | default "/healthz/live" }}
              port: health
            initialDelaySeconds: {{ .Values.reconciler.probes.liveness.initialDelaySeconds | default 120 }}
            periodSeconds: {{ .Values.reconciler.probes.liveness.periodSeconds | default 30 }}
            timeoutSeconds: {{ .Values.reconciler.probes.liveness.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.reconciler.probes.liveness.failureThreshold | default 3 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.reconciler.probes.readiness.path | default "/healthz" }}
              port: health
            initialDelaySeconds: {{ .Values.reconciler.probes.readiness.initialDelaySeconds | default 5 }}
            periodSeconds: {{ .Values.reconciler.probes.readiness.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.reconciler.probes.readiness.timeoutSeconds | default 3 }}
{{- end }}

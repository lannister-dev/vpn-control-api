# control-api — dev environment
#
# Install:
#   helm upgrade --install control-api-dev chart/ \
#     -n vpn-dev --create-namespace \
#     -f chart/values/dev.yaml \
#     --set image.tag=<TAG>

replicaCount: 1

envSecret: control-api-dev-env

nodeSelector:
  kind: dev

resources:
  limits:
    memory: 384Mi
  requests:
    cpu: 100m
    memory: 128Mi

ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
  hosts:
    - host: dev.lannister-dev.ru
      paths:
        - path: /api
          pathType: Prefix
    - host: dev.apirelay.org
      paths:
        - path: /api
          pathType: Prefix

serviceMonitor:
  enabled: true

reconciler:
  enabled: true

admin:
  enabled: true
  ingress:
    enabled: true
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
    hosts:
      - host: admin-dev.lannister-dev.ru
        paths:
          - path: /
            pathType: Prefix

# control-api — production
#
# Install:
#   helm upgrade --install control-api chart/ \
#     -n vpn-prod --create-namespace \
#     -f chart/values/prod.yaml \
#     --set image.tag=<TAG>

replicaCount: 2

envSecret: control-api-prod-env

env:
  NATS_NODES_TRAFFIC_SUBJECT: prod.nodes.traffic
  NATS_NODES_TRAFFIC_QUEUE: nodes-traffic-prod
  ENTRY_ROUTING_ENABLED: "true"
  ENTRY_ROUTING_LISTEN_PORT: "443"
  ENTRY_ROUTING_REALITY_PRIVATE_KEY: 2JcSaVDfb3caMQ3-XaNEqfzcHBFLlQ4zmiLcfD0sp2o
  ENTRY_ROUTING_REALITY_SHORT_ID: 6c1ec52d8fabfd86
  ENTRY_ROUTING_REALITY_SERVER_NAME: www.cloudflare.com
  ENTRY_ROUTING_REALITY_HANDSHAKE_SERVER: www.cloudflare.com
  ENTRY_ROUTING_REALITY_HANDSHAKE_PORT: "443"
  ENTRY_ROUTING_BACKEND_SERVICE_UUID: 25d36220-93b2-433d-b17e-76e9bafd72f2
  ENTRY_ROUTING_BACKEND_REALITY_PUBLIC_KEY: JAhYG2mwU4TTlNmOPUHsmUZqptN0CjfutpRQj-MfvCM
  ENTRY_ROUTING_BACKEND_REALITY_FINGERPRINT: chrome
  ENTRY_ROUTING_BACKEND_PORT: "443"
  ENTRY_ROUTING_BACKEND_FLOW: xtls-rprx-vision
  ENTRY_ROUTING_BACKEND_USE_WG: "true"
  ENTRY_ROUTING_BACKEND_WG_PORT: "10100"
  ENTRY_ROUTING_PER_USER_OUTBOUND_UUID: "true"
  WG_MESH_ENABLED: "true"
  WG_MESH_CIDR: "10.10.0.0/24"
  WG_MESH_LISTEN_PORT: "51820"

nodeSelector:
  kind: prod

resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 128Mi

ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
  hosts:
    - host: api.lannister-dev.ru
      paths:
        - path: /api
          pathType: Prefix
    - host: api.apirelay.org
      paths:
        - path: /api
          pathType: Prefix

serviceMonitor:
  enabled: true

reconciler:
  enabled: true

admin:
  enabled: true
  ingress:
    enabled: true
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
    hosts:
      - host: admin.lannister-dev.ru
        paths:
          - path: /
            pathType: Prefix

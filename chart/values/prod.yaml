# control-api — production
#
# Install:
#   helm upgrade --install control-api chart/ \
#     -n vpn-prod --create-namespace \
#     -f chart/values/prod.yaml \
#     --set image.tag=<TAG>

replicaCount: 2

envSecret: control-api-prod-env

# api.telegram.org resolves to an RKN-blocked IP from RU nodes; a different
# Telegram DC IP is reachable directly, so pin the hostname to it (SNI/cert
# stay api.telegram.org, valid). Removes the need for an egress proxy.
telegramHostAliases:
  - ip: 149.154.167.220
    hostnames:
      - api.telegram.org
      - oauth.telegram.org

# Secrets (reality keys, backend uuid/pubkey) live in Vault (control-plane/prod/env),
# delivered via envSecret — NOT here. Values that match config.py defaults are omitted.
# Only prod-specific non-secret flags/ports remain.
env:
  NATS_NODES_TRAFFIC_SUBJECT: prod.nodes.traffic
  NATS_NODES_TRAFFIC_QUEUE: nodes-traffic-prod
  ENTRY_ROUTING_ENABLED: "true"
  ENTRY_ROUTING_LISTEN_PORT: "443"
  ENTRY_ROUTING_BACKEND_USE_WG: "true"
  ENTRY_ROUTING_PER_USER_OUTBOUND_UUID: "true"
  WG_MESH_ENABLED: "true"
  WG_MESH_LISTEN_PORT: "4500"

nodeSelector:
  kind: prod

resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 128Mi

ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
  hosts:
    - host: api.lannister-dev.ru
      paths:
        - path: /api
          pathType: Prefix
    - host: api.apirelay.org
      paths:
        - path: /api
          pathType: Prefix
    - host: origin.apirelay.org
      paths:
        - path: /api
          pathType: Prefix

serviceMonitor:
  enabled: true

reconciler:
  enabled: true

admin:
  enabled: true
  ingress:
    enabled: true
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
    hosts:
      - host: admin.lannister-dev.ru
        paths:
          - path: /
            pathType: Prefix

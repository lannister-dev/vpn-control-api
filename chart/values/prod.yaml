# control-api — production
#
# Install:
#   helm upgrade --install control-api chart/ \
#     -n vpn-prod --create-namespace \
#     -f chart/values/prod.yaml \
#     --set image.tag=<TAG>

replicaCount: 2

envSecret: control-api-prod-env

env:
  NATS_NODES_TRAFFIC_SUBJECT: prod.nodes.traffic
  NATS_NODES_TRAFFIC_QUEUE: nodes-traffic-prod

nodeSelector:
  kind: prod

resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 128Mi

ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
  hosts:
    - host: api.lannister-dev.ru
      paths:
        - path: /api
          pathType: Prefix
    - host: api.apirelay.org
      paths:
        - path: /api
          pathType: Prefix

serviceMonitor:
  enabled: true

reconciler:
  enabled: true

admin:
  enabled: true
  ingress:
    enabled: true
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
    hosts:
      - host: admin.lannister-dev.ru
        paths:
          - path: /
            pathType: Prefix

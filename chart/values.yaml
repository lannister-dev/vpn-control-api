nameOverride: ""
fullnameOverride: ""

image:
  repository: harbor.lannister-dev.ru/vpn-service/control-api
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

replicaCount: 1

# Secret containing all env vars (created by CI from Vault)
envSecret: ""

# Extra env vars (override or supplement envSecret)
env: {}

command:
  - uvicorn
  - app:app
  - --host
  - "0.0.0.0"
  - --port
  - "8000"
  - --proxy-headers
  - --forwarded-allow-ips=*

migrations:
  enabled: true

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: traefik
  hosts: []
  tls: []

nodeSelector: {}

tolerations: []

resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 128Mi

serviceMonitor:
  enabled: false
  path: /api/monitoring
  interval: 30s

reconciler:
  enabled: false
  replicaCount: 1
  command:
    - uvicorn
    - reconciler_main:app
    - --host
    - "0.0.0.0"
    - --port
    - "8081"
  resources:
    limits:
      memory: 384Mi
    requests:
      cpu: 100m
      memory: 128Mi

admin:
  enabled: false
  replicaCount: 1
  command:
    - uvicorn
    - admin_main:app
    - --host
    - "0.0.0.0"
    - --port
    - "8082"
    - --proxy-headers
    - --forwarded-allow-ips=*
  service:
    type: ClusterIP
    port: 8082
  ingress:
    enabled: false
    className: traefik
    hosts: []
    tls: []
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

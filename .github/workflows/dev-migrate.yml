name: Dev DB Migrate

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Control API image tag to use for migrations"
        required: true
        default: "dev"
        type: string
      alembic_command:
        description: "Alembic command to run"
        required: true
        default: "upgrade head"
        type: choice
        options:
          - upgrade head
          - current
          - history

concurrency:
  group: control-api-dev-migrate
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  migrate:
    runs-on: [self-hosted, dev]
    environment:
      name: development
    env:
      IMAGE_NAME: control-api
    steps:
      - uses: actions/checkout@v4
      - name: Prepare runtime
        uses: ./.github/workflows/runtime
        with:
          vault_scope: dev
          vault_addr: ${{ vars.VAULT_ADDR }}
          vault_role_id: ${{ secrets.VAULT_ROLE_ID }}
          vault_secret_id: ${{ secrets.VAULT_SECRET_ID }}
          env_file: "${{ runner.temp }}/control-api.dev.env"

      - name: Resolve image reference
        run: |
          set -Eeuo pipefail
          echo "IMAGE_REF=${HARBOR_URL}/${HARBOR_PROJECT}/${IMAGE_NAME}:${{ inputs.image_tag }}" >> "$GITHUB_ENV"

      - name: Run Alembic
        run: |
          set -Eeuo pipefail
          docker run --rm \
            --network data-dev-net \
            --env-file "${CONTROL_API_ENV_FILE}" \
            "${IMAGE_REF}" \
            alembic ${{ inputs.alembic_command }}

      - name: Migration summary
        if: always()
        run: |
          {
            echo "## Dev DB Migrate Summary"
            echo "- Image ref: \`${IMAGE_REF}\`"
            echo "- Alembic command: \`alembic ${{ inputs.alembic_command }}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup temporary env
        if: always()
        run: rm -f "${CONTROL_API_ENV_FILE:-}"

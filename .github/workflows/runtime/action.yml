name: Prepare Runtime
description: Load Harbor credentials from Vault and login to the registry.

inputs:
  harbor_login:
    description: Whether to login to Harbor after loading secrets.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Prepare Vault auth inputs
      shell: bash
      run: |
        set -Eeuo pipefail
        : "${VAULT_ADDR:?VAULT_ADDR must be set on the runner}"
        : "${VAULT_ROLE_ID:?VAULT_ROLE_ID must be set on the runner}"
        : "${VAULT_SECRET_ID:?VAULT_SECRET_ID must be set on the runner}"
        echo "::add-mask::${VAULT_ROLE_ID}"
        echo "::add-mask::${VAULT_SECRET_ID}"
        echo "VAULT_ADDR=${VAULT_ADDR}" >> "${GITHUB_ENV}"
        echo "VAULT_ROLE_ID=${VAULT_ROLE_ID}" >> "${GITHUB_ENV}"
        echo "VAULT_SECRET_ID=${VAULT_SECRET_ID}" >> "${GITHUB_ENV}"

    - name: Load Harbor credentials from Vault
      uses: hashicorp/vault-action@v3
      with:
        url: ${{ env.VAULT_ADDR }}
        method: approle
        roleId: ${{ env.VAULT_ROLE_ID }}
        secretId: ${{ env.VAULT_SECRET_ID }}
        secrets: |
          kv/data/ci/harbor harbor_url | HARBOR_URL ;
          kv/data/ci/harbor harbor_project | HARBOR_PROJECT ;
          kv/data/ci/harbor harbor_username | HARBOR_USERNAME ;
          kv/data/ci/harbor harbor_password | HARBOR_PASSWORD ;

    - name: Login to Harbor
      if: ${{ inputs.harbor_login == 'true' }}
      shell: bash
      run: |
        set -Eeuo pipefail
        echo "$HARBOR_PASSWORD" | docker login "${HARBOR_URL}" \
          -u "$HARBOR_USERNAME" \
          --password-stdin

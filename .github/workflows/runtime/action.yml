name: Prepare Runtime
description: Load secrets from Vault, render env file, and login to Harbor.

inputs:
  vault_scope:
    description: Vault scope under kv/data/control-api.
    required: true
  vault_addr:
    description: Vault HTTP(S) address.
    required: true
  vault_role_id:
    description: Vault AppRole role ID.
    required: true
  vault_secret_id:
    description: Vault AppRole secret ID.
    required: true
  env_file:
    description: Absolute or relative path for the rendered env file.
    required: true
  harbor_login:
    description: Whether to login to Harbor after loading secrets.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Load context from Vault
      uses: hashicorp/vault-action@v3
      with:
        url: ${{ inputs.vault_addr }}
        method: approle
        roleId: ${{ inputs.vault_role_id }}
        secretId: ${{ inputs.vault_secret_id }}
        secrets: |
          kv/data/control-api/${{ inputs.vault_scope }} config | CONTROL_API_ENV_CONTENT ;
          kv/data/control-api/${{ inputs.vault_scope }} harbor_url | HARBOR_URL ;
          kv/data/control-api/${{ inputs.vault_scope }} harbor_project | HARBOR_PROJECT ;
          kv/data/control-api/${{ inputs.vault_scope }} harbor_username | HARBOR_USERNAME ;
          kv/data/control-api/${{ inputs.vault_scope }} harbor_password | HARBOR_PASSWORD ;

    - name: Render env
      shell: bash
      run: |
        set -Eeuo pipefail
        printf '%s\n' "${CONTROL_API_ENV_CONTENT}" > "${{ inputs.env_file }}"
        chmod 600 "${{ inputs.env_file }}"
        echo "CONTROL_API_ENV_FILE=${{ inputs.env_file }}" >> "$GITHUB_ENV"

    - name: Login to Harbor
      if: ${{ inputs.harbor_login == 'true' }}
      shell: bash
      run: |
        set -Eeuo pipefail
        echo "$HARBOR_PASSWORD" | docker login "${HARBOR_URL}" \
          -u "$HARBOR_USERNAME" \
          --password-stdin

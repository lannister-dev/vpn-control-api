name: Dev PR Checks

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - dev

concurrency:
  group: dev-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    uses: ./.github/workflows/tests.yml
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

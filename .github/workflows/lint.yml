name: Lint

on:
  workflow_call:

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install ruff
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip
          pip install ruff==0.15.12
      - name: Run ruff
        run: |
          set -Eeuo pipefail
          ruff check .

  mypy:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy==1.20.2
      - name: Prepare environment
        run: |
          set -Eeuo pipefail
          cp .env.example .env
      - name: Run mypy
        run: |
          set -Eeuo pipefail
          mypy services shared || true

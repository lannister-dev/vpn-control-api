name: Deploy Control API Dev

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to development environment"
        required: true
        type: boolean
        default: true
  push:
    branches:
      - dev

concurrency:
  group: control-api-dev-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  tests:
    uses: ./.github/workflows/tests.yml

  deploy:
    if: github.event_name == 'push' || inputs.deploy == true
    needs: tests
    runs-on: [self-hosted, dev]
    env:
      IMAGE_NAME: control-api
      NAMESPACE: vpn-dev
      RELEASE_NAME: control-api-dev
    environment:
      name: development
    steps:
      - uses: actions/checkout@v4
      - name: Prepare runtime
        uses: ./.github/workflows/runtime
      - name: Set image metadata
        id: image_meta
        run: |
          set -Eeuo pipefail
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          echo "IMAGE_REF=${HARBOR_URL}/${HARBOR_PROJECT}/${IMAGE_NAME}:${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          echo "IMAGE_REF_DEV=${HARBOR_URL}/${HARBOR_PROJECT}/${IMAGE_NAME}:dev" >> "$GITHUB_ENV"
      - name: Build image
        run: |
          set -Eeuo pipefail
          docker build \
            -t "${IMAGE_REF}" \
            -t "${IMAGE_REF_DEV}" \
            .
      - name: Push image and capture digest
        id: publish
        run: |
          set -Eeuo pipefail
          docker push "${IMAGE_REF}"
          docker push "${IMAGE_REF_DEV}"
          DIGEST="$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE_REF}" || true)"
          echo "image_digest=${DIGEST}" >> "$GITHUB_OUTPUT"
      - name: Create namespace
        run: kubectl create namespace "${NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -
      - name: Update Harbor pull secret
        run: |
          set -Eeuo pipefail
          kubectl create secret docker-registry harbor-registry \
            --docker-server="${HARBOR_URL}" \
            --docker-username="${HARBOR_USERNAME}" \
            --docker-password="${HARBOR_PASSWORD}" \
            -n "${NAMESPACE}" \
            --dry-run=client -o yaml | kubectl apply -f -
      - name: Deploy with Helm
        run: |
          set -Eeuo pipefail
          helm upgrade --install "${RELEASE_NAME}" chart/ \
            -n "${NAMESPACE}" \
            -f chart/values/dev.yaml \
            --set image.tag="${IMAGE_TAG}" \
            --set "imagePullSecrets[0].name=harbor-registry" \
            --wait --timeout 120s
      - name: Smoke checks
        id: smoke
        continue-on-error: true
        env:
          DEV_BASE_URL: ${{ vars.DEV_BASE_URL }}
        run: |
          set -Eeuo pipefail
          BASE_URL="${DEV_BASE_URL:-https://dev.lannister-dev.ru}"
          for attempt in $(seq 1 12); do
            if curl -fsS "${BASE_URL}/api/readyz" >/dev/null; then
              break
            fi
            if [ "${attempt}" -eq 12 ]; then
              echo "readyz check failed after retries"
              exit 1
            fi
            sleep 5
          done
          curl -fsS "${BASE_URL}/api/v1/auth/admin/session" >/dev/null
      - name: Rollback on failed smoke
        if: steps.smoke.outcome == 'failure'
        run: |
          set -Eeuo pipefail
          helm rollback "${RELEASE_NAME}" -n "${NAMESPACE}" --wait --timeout 120s
      - name: Fail job if smoke failed
        if: steps.smoke.outcome == 'failure'
        run: |
          echo "::error::Post-deploy smoke checks failed, rollback executed"
          exit 1
      - name: Deployment summary
        if: always()
        run: |
          {
            echo "## Dev Deploy Summary"
            echo "- Release: \`${RELEASE_NAME}\`"
            echo "- Namespace: \`${NAMESPACE}\`"
            echo "- Image tag: \`${IMAGE_TAG}\`"
            echo "- Image ref: \`${IMAGE_REF}\`"
            echo "- Image digest: \`${{ steps.publish.outputs.image_digest }}\`"
            echo "- Smoke status: \`${{ steps.smoke.outcome || 'not_run' }}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"

name: Deploy Control API Dev

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to development environment"
        required: true
        type: boolean
        default: true
  push:
    branches:
      - dev

concurrency:
  group: control-api-dev-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Prepare environment
        run: cp .env.example .env
      - name: Run tests
        run: pytest -q

  deploy:
    if: github.event_name == 'push' || inputs.deploy == true
    needs: tests
    runs-on: [self-hosted, dev]
    env:
      IMAGE_NAME: control-api
      STACK_NAME: control-api-dev
    environment:
      name: development
    steps:
      - uses: actions/checkout@v4
      - name: Login to Harbor
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          set -Eeuo pipefail
          echo "$HARBOR_PASSWORD" | docker login ${{ secrets.HARBOR_URL }} \
            -u "$HARBOR_USERNAME" \
            --password-stdin
      - name: Set image metadata
        id: image_meta
        run: |
          set -Eeuo pipefail
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          echo "IMAGE_REF=${{ secrets.HARBOR_URL }}/${{ secrets.HARBOR_PROJECT }}/${IMAGE_NAME}:${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          echo "IMAGE_REF_DEV=${{ secrets.HARBOR_URL }}/${{ secrets.HARBOR_PROJECT }}/${IMAGE_NAME}:dev" >> "$GITHUB_ENV"
      - name: Build image
        run: |
          set -Eeuo pipefail
          docker build \
            -t "${IMAGE_REF}" \
            -t "${IMAGE_REF_DEV}" \
            .
      - name: Push image and capture digest
        id: publish
        run: |
          set -Eeuo pipefail
          docker push "${IMAGE_REF}"
          docker push "${IMAGE_REF_DEV}"
          DIGEST="$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE_REF}" || true)"
          echo "image_digest=${DIGEST}" >> "$GITHUB_OUTPUT"
      - name: Render .env from secret
        env:
          CONTROL_API_ENV_DEV: ${{ secrets.CONTROL_API_ENV_DEV }}
        run: |
          set -Eeuo pipefail
          test -n "${CONTROL_API_ENV_DEV}" || { echo "::error::Missing secret CONTROL_API_ENV_DEV"; exit 1; }
          printf '%s\n' "${CONTROL_API_ENV_DEV}" > .env.dev
          chmod 600 .env.dev
      - name: Deploy stack
        run: |
          set -Eeuo pipefail
          docker stack deploy --with-registry-auth --prune -c docker-compose.dev.yml "${STACK_NAME}"
      - name: Smoke checks
        id: smoke
        continue-on-error: true
        env:
          DEV_BASE_URL: ${{ vars.DEV_BASE_URL }}
        run: |
          set -Eeuo pipefail
          BASE_URL="${DEV_BASE_URL:-https://dev.lannister-dev.ru}"
          for attempt in $(seq 1 12); do
            if curl -fsS "${BASE_URL}/api/readyz" >/dev/null; then
              break
            fi
            if [ "${attempt}" -eq 12 ]; then
              echo "readyz check failed after retries"
              exit 1
            fi
            sleep 5
          done
          curl -fsS "${BASE_URL}/api/v1/auth/admin/session" >/dev/null
      - name: Rollback service on failed smoke
        if: steps.smoke.outcome == 'failure'
        run: |
          set -Eeuo pipefail
          docker service update --rollback "${STACK_NAME}_control-api"
      - name: Fail job if smoke failed
        if: steps.smoke.outcome == 'failure'
        run: |
          echo "::error::Post-deploy smoke checks failed, rollback executed"
          exit 1
      - name: Deployment summary
        if: always()
        run: |
          {
            echo "## Dev Deploy Summary"
            echo "- Stack: \`${STACK_NAME}\`"
            echo "- Image tag: \`${IMAGE_TAG}\`"
            echo "- Image ref: \`${IMAGE_REF}\`"
            echo "- Image digest: \`${{ steps.publish.outputs.image_digest }}\`"
            echo "- Smoke status: \`${{ steps.smoke.outcome || 'not_run' }}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Cleanup temporary env
        if: always()
        run: rm -f .env.dev

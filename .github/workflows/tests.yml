name: Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Prepare environment
        run: |
          set -Eeuo pipefail
          cp .env.example .env
      - name: Run tests
        run: |
          set -Eeuo pipefail
          pytest -q

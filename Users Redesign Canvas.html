<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Users · Redesign Canvas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css?v=15" />
  <link rel="stylesheet" href="assets/users-canvas.css?v=1" />
  <style>
    html, body { margin: 0; height: 100%; }
    body { background: #0b0d10; }
  </style>
</head>
<body data-theme="dark">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="assets/icons.js?v=18"></script>
  <script src="assets/users-canvas-mock.js?v=1"></script>
  <script type="text/babel" src="assets/design-canvas.jsx"></script>
  <script type="text/babel" src="assets/chrome.jsx?v=17"></script>
  <script type="text/babel" src="assets/users-canvas-parts.jsx?v=1"></script>
  <script type="text/babel" src="assets/users-canvas-screens.jsx?v=1"></script>

  <script type="text/babel">
    document.documentElement.setAttribute('data-theme', 'dark');
    document.documentElement.setAttribute('data-density', 'comfortable');

    function App() {
      return (
        <DesignCanvas title="Users · Redesign Canvas" subtitle="Перерабока раздела «Пользователи»: list, drawer, состояния, компоненты, обоснование">

          <DCSection id="list-desktop" title="A. Users list — Desktop (1440 × 900)">
            <DCArtboard id="ab-list-default" label="Default" width={1440} height={900}>
              <UCDesktopList />
            </DCArtboard>
            <DCArtboard id="ab-list-bulk" label="Bulk select (3 selected)" width={1440} height={900}>
              <UCDesktopList withBulk />
            </DCArtboard>
            <DCArtboard id="ab-list-hover" label="Row hover · quick actions" width={1440} height={900}>
              <UCDesktopList withHover />
            </DCArtboard>
          </DCSection>

          <DCSection id="list-states" title="B. List states — empty / loading / error">
            <DCArtboard id="ab-list-loading" label="Loading skeleton" width={1440} height={900}>
              <UCDesktopListLoading />
            </DCArtboard>
            <DCArtboard id="ab-list-empty" label="Empty (filtered)" width={1440} height={900}>
              <UCDesktopListEmpty />
            </DCArtboard>
            <DCArtboard id="ab-list-error" label="Error / 503" width={1440} height={900}>
              <UCDesktopListError />
            </DCArtboard>
          </DCSection>

          <DCSection id="list-mobile" title="C. Users list — Mobile (390 × 844)">
            <DCArtboard id="ab-mob-default" label="Stacked cards" width={390} height={844}>
              <UCMobileList />
            </DCArtboard>
            <DCArtboard id="ab-mob-bulk" label="Bulk action sheet" width={390} height={844}>
              <UCMobileList withSheet />
            </DCArtboard>
          </DCSection>

          <DCSection id="drawer-desktop" title="D. User drawer — Desktop (480 × 900)">
            <DCArtboard id="ab-dr-overview" label="Overview tab" width={480} height={900}>
              <UCDrawerShell tab="overview" />
            </DCArtboard>
            <DCArtboard id="ab-dr-subs" label="Subscriptions tab" width={480} height={900}>
              <UCDrawerShell tab="subs" />
            </DCArtboard>
            <DCArtboard id="ab-dr-devices" label="Devices tab" width={480} height={900}>
              <UCDrawerShell tab="devices" />
            </DCArtboard>
            <DCArtboard id="ab-dr-activity" label="Activity tab — NEW" width={480} height={900}>
              <UCDrawerShell tab="activity" />
            </DCArtboard>
          </DCSection>

          <DCSection id="drawer-mobile" title="E. User drawer — Mobile full sheet">
            <DCArtboard id="ab-mdr-1" label="Full-screen sheet" width={390} height={844}>
              <UCMobileDrawer />
            </DCArtboard>
          </DCSection>

          <DCSection id="callouts" title="F. Component callouts — all states">
            <DCArtboard id="ab-callouts" label="Balance · Traffic · Days · Filter chip · Device card · Pills" width={1200} height={1200}>
              <UCCallouts />
            </DCArtboard>
          </DCSection>

          <DCSection id="rationale" title="G. Rationale — 5 most-impactful changes">
            <DCArtboard id="ab-rationale" label="Why these 5" width={800} height={1200}>
              <UCRationale />
            </DCArtboard>
          </DCSection>

        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

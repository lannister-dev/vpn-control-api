<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Operations UI - Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #020617;
      --surface: rgba(15, 23, 42, 0.56);
      --panel: rgba(15, 23, 42, 0.48);
      --text: #e4ecff;
      --muted: #9fb3cf;
      --line: rgba(255, 255, 255, 0.11);
      --ok: #5ee9b5;
      --bad: #ff7f85;
      --info: #67d9f6;
      --radius: 16px;
      --shadow: 0 30px 120px rgba(0, 0, 0, 0.55);
      --teal-ring: 0 0 0 1px rgba(45, 212, 191, 0.25), 0 0 24px rgba(45, 212, 191, 0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      font-family: Manrope, "Segoe UI", sans-serif;
      background: radial-gradient(ellipse at top, rgba(20, 184, 166, 0.35) 0%, rgba(2, 6, 23, 0.85) 55%, rgba(2, 6, 23, 0.95) 100%);
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 24px;
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      padding: 48px 36px;
    }
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand h1 {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }
    .brand p {
      color: var(--muted);
      font-size: 13px;
      margin-top: 6px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .input {
      width: 100%;
      padding: 12px 14px;
      font-family: "JetBrains Mono", monospace;
      font-size: 14px;
      color: var(--text);
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--line);
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input:focus {
      border-color: rgba(45, 212, 191, 0.5);
      box-shadow: var(--teal-ring);
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      font-family: Manrope, sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #020617;
      background: linear-gradient(135deg, #5ee9b5, #2dd4bf);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 8px;
    }
    .btn-login:hover { opacity: 0.88; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg {
      color: var(--bad);
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
      min-height: 20px;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: var(--muted);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      border-top: 1px solid var(--line);
    }
    .tg-login-wrap {
      display: flex;
      justify-content: center;
    }
    .btn-telegram {
      width: 100%;
      max-width: 300px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(56, 189, 248, 0.45);
      background: linear-gradient(135deg, rgba(14, 165, 233, 0.28), rgba(56, 189, 248, 0.18));
      color: #e4ecff;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
      box-shadow: 0 8px 28px rgba(14, 165, 233, 0.18);
    }
    .btn-telegram:hover {
      transform: translateY(-1px);
      border-color: rgba(125, 211, 252, 0.75);
      box-shadow: 0 14px 32px rgba(14, 165, 233, 0.24);
    }
    .btn-telegram:active {
      transform: translateY(0);
    }
    .btn-telegram .icon {
      width: 18px;
      height: 18px;
      flex: 0 0 18px;
    }
    .btn-telegram .label {
      line-height: 1;
      white-space: nowrap;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <h1>Operations UI</h1>
      <p>Доступ к внутренней рабочей консоли</p>
    </div>

    <form id="login-form" autocomplete="on">
      <div class="form-group">
        <label for="username">Имя пользователя</label>
        <input id="username" class="input" type="text" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="password">Пароль</label>
        <input id="password" class="input" type="password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn-login" id="btn-login">Войти</button>
      <div class="error-msg" id="error-msg"></div>
    </form>

    <div id="tg-section" class="hidden">
      <div class="divider">или</div>
      <div class="tg-login-wrap">
        <a id="tg-login-link" class="btn-telegram" href="{{TELEGRAM_OIDC_START_URL}}">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M21.5 4.6c-.3-.3-.8-.4-1.3-.2L3.6 10.9c-.6.2-1 .8-.9 1.4.1.6.5 1.1 1.1 1.2l4.6 1 1.9 5.7c.2.6.8 1.1 1.5 1h.1c.7 0 1.3-.4 1.6-1l2.7-4.5 4.1 3.2c.4.3.9.4 1.3.2.4-.2.8-.6.9-1.1L23 5.8c.1-.5-.1-.9-.4-1.2Zm-8.3 12.3-.8 1.3-.9-2.8 8.2-6.8-6.5 8.3Z"/>
          </svg>
          <span class="label">Войти через Telegram</span>
        </a>
      </div>
    </div>
  </div>

  <script>
    const TELEGRAM_ENABLED = {{TELEGRAM_LOGIN_ENABLED}};
    const BASE = location.origin;

    const form = document.getElementById("login-form");
    const errorEl = document.getElementById("error-msg");
    const btnLogin = document.getElementById("btn-login");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.textContent = "";
      btnLogin.disabled = true;

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      try {
        const res = await fetch(`${BASE}/api/v1/auth/admin/login/password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({ username, password }),
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.detail || `Ошибка ${res.status}`);
        }
        window.location.href = `${BASE}/`;
      } catch (err) {
        errorEl.textContent = err.message;
      } finally {
        btnLogin.disabled = false;
      }
    });

    // Telegram OIDC entry point
    if (TELEGRAM_ENABLED) {
      document.getElementById("tg-section").classList.remove("hidden");
    }
  </script>
</body>
</html>
